version: 2

project_name: ha-nova

builds:
  - id: ha-nova-darwin
    dir: cli
    binary: ha-nova
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

  - id: ha-nova-other
    dir: cli
    binary: ha-nova
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - formats: [binary]
    name_template: "ha-nova-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  github:
    owner: markusleben
    name: ha-nova
  draft: false
  prerelease: auto
  name_template: "HA NOVA v{{.Version}}"
  header: |
    ## Install or Update

    **macOS / Linux:**
    ```sh
    curl -fsSL https://raw.githubusercontent.com/markusleben/ha-nova/main/install.sh | bash
    ```

    **Windows (PowerShell):**
    ```powershell
    irm https://raw.githubusercontent.com/markusleben/ha-nova/main/install.ps1 | iex
    ```

    Already installed? Run `ha-nova check-update` or `ha-nova update`.

    > The bundle assets below are consumed by the installers automatically — do not download them manually unless you know you need a raw binary.
  footer: |
    ---
    **Full documentation:** [github.com/markusleben/ha-nova](https://github.com/markusleben/ha-nova)

signs:
  - cmd: codesign
    args:
      - "--sign"
      - "Developer ID Application: {{ .Env.APPLE_IDENTITY }}"
      - "--options"
      - "runtime"
      - "${artifact}"
    artifacts: binary
    ids:
      - ha-nova-darwin
    output: false
