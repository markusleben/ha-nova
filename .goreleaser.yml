version: 2

project_name: ha-nova-relay

builds:
  - id: relay-darwin
    dir: cli
    binary: relay
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

  - id: relay-other
    dir: cli
    binary: relay
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - formats: [binary]
    name_template: "relay-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  github:
    owner: markusleben
    name: ha-nova
  draft: false
  prerelease: auto
  name_template: "HA NOVA v{{.Version}}"
  header: |
    ## Install or Update

    **macOS:**
    ```sh
    curl -fsSL https://raw.githubusercontent.com/markusleben/ha-nova/main/install.sh | bash
    ```

    Already installed? You can also run `ha-nova update`.

    > The binary assets below are consumed by the installer automatically — do not download them manually.
  footer: |
    ---
    **Full documentation:** [github.com/markusleben/ha-nova](https://github.com/markusleben/ha-nova)

signs:
  - cmd: codesign
    args:
      - "--sign"
      - "Developer ID Application: {{ .Env.APPLE_IDENTITY }}"
      - "--options"
      - "runtime"
      - "${artifact}"
    artifacts: binary
    ids:
      - relay-darwin
    output: false

