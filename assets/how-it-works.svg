<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="300" rx="12" fill="#f8f9fa"/>

  <!-- ==================== TOP ROW ==================== -->

  <!-- AI Client Box -->
  <rect x="30" y="35" width="190" height="100" rx="10" fill="#ffffff" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
  <text x="125" y="73" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a2e">Your AI Client</text>
  <text x="125" y="95" text-anchor="middle" font-size="12" fill="#6b7280">Claude, Codex, Gemini...</text>
  <text x="125" y="113" text-anchor="middle" font-size="11" fill="#9ca3af">on your machine</text>

  <!-- Bidirectional: AI Client ↔ Relay -->
  <!-- Top line: Client → Relay -->
  <path d="M 220 78 L 308 78" stroke="#4a90d9" stroke-width="1.5" fill="none"/>
  <polygon points="305,73 315,78 305,83" fill="#4a90d9"/>
  <!-- Bottom line: Relay → Client -->
  <path d="M 320 93 L 232 93" stroke="#4a90d9" stroke-width="1.5" fill="none"/>
  <polygon points="235,88 225,93 235,98" fill="#4a90d9"/>

  <!-- Relay Box (emphasized) -->
  <rect x="320" y="25" width="200" height="120" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="420" y="63" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">NOVA Relay</text>
  <text x="420" y="85" text-anchor="middle" font-size="12" fill="#059669">Runs on your HA server</text>
  <text x="420" y="105" text-anchor="middle" font-size="11" fill="#6b7280">Secure bridge + local access</text>
  <text x="420" y="125" text-anchor="middle" font-size="11" fill="#9ca3af">~1,500 lines · no business logic</text>

  <!-- Bidirectional: Relay ↔ HA -->
  <!-- Top line: Relay → HA -->
  <path d="M 520 78 L 598 78" stroke="#10b981" stroke-width="1.5" fill="none"/>
  <polygon points="595,73 605,78 595,83" fill="#10b981"/>
  <!-- Bottom line: HA → Relay -->
  <path d="M 610 93 L 532 93" stroke="#10b981" stroke-width="1.5" fill="none"/>
  <polygon points="535,88 525,93 535,98" fill="#10b981"/>

  <!-- Home Assistant Box -->
  <rect x="610" y="35" width="190" height="100" rx="10" fill="#ffffff" stroke="#18bcf2" stroke-width="2" filter="url(#shadow)"/>
  <text x="705" y="73" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a2e">Home Assistant</text>
  <text x="705" y="95" text-anchor="middle" font-size="12" fill="#6b7280">Your smart home</text>
  <text x="705" y="113" text-anchor="middle" font-size="11" fill="#9ca3af">same server as relay</text>

  <!-- ==================== MIDDLE: Relay Benefits ==================== -->

  <!-- Benefit pills -->
  <rect x="310" y="168" width="150" height="32" rx="16" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="385" y="189" text-anchor="middle" font-size="11" font-weight="500" fill="#059669">Token stays safe</text>

  <rect x="470" y="168" width="150" height="32" rx="16" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="545" y="189" text-anchor="middle" font-size="11" font-weight="500" fill="#059669">Local API access</text>

  <rect x="630" y="168" width="165" height="32" rx="16" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="712" y="189" text-anchor="middle" font-size="11" font-weight="500" fill="#059669">Read &amp; write configs</text>

  <!-- Connector lines from relay/HA to pills (orthogonal, no diagonals) -->
  <!-- Pill 1: straight down from relay -->
  <path d="M 385 145 L 385 168" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2" fill="none"/>
  <!-- Pill 2: down from relay, then right to pill center -->
  <path d="M 500 145 L 500 156 L 545 156 L 545 168" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2" fill="none"/>
  <!-- Pill 3: straight down from HA -->
  <path d="M 712 135 L 712 168" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2" fill="none"/>

  <!-- ==================== BOTTOM LEFT: Skills ==================== -->

  <!-- Skills Box -->
  <rect x="30" y="220" width="190" height="60" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="125" y="248" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a2e">Skills</text>
  <text x="125" y="266" text-anchor="middle" font-size="12" fill="#6b7280">Plain text (Markdown)</text>

  <!-- Arrow: Skills → AI Client (stops outside box) -->
  <path d="M 125 220 L 125 145" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <polygon points="119,148 125,137 131,148" fill="#f59e0b"/>
  <text x="140" y="185" text-anchor="start" font-size="12" fill="#b45309">AI reads skills</text>

</svg>
