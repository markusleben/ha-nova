<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="50%" stop-color="#0D1525"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18BCF2"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE4B5"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD666" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#FF8C00" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#18BCF2" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB347" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="title-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Background stars -->
  <g opacity="0.3">
    <circle cx="80" cy="60" r="1.2" fill="white"/><circle cx="210" cy="130" r="1" fill="white"/>
    <circle cx="50" cy="340" r="1.4" fill="white"/><circle cx="160" cy="520" r="0.9" fill="white"/>
    <circle cx="460" cy="50" r="1.1" fill="white"/><circle cx="740" cy="55" r="1" fill="white"/>
    <circle cx="950" cy="90" r="1.3" fill="white"/><circle cx="1120" cy="60" r="0.9" fill="white"/>
    <circle cx="1220" cy="150" r="1.1" fill="white"/><circle cx="660" cy="590" r="1" fill="white"/>
    <circle cx="900" cy="575" r="1.2" fill="white"/><circle cx="1080" cy="585" r="0.9" fill="white"/>
    <circle cx="1200" cy="510" r="1.1" fill="white"/><circle cx="110" cy="575" r="1" fill="white"/>
    <circle cx="510" cy="590" r="1.2" fill="white"/><circle cx="30" cy="160" r="1" fill="white"/>
    <circle cx="350" cy="600" r="0.8" fill="white"/><circle cx="1050" cy="180" r="1" fill="white"/>
  </g>

  <!-- ==================== SAFE ZONE: 40px inset = x:40-1240, y:40-600 ==================== -->

  <!-- Ambient glow behind star -->
  <circle cx="230" cy="300" r="250" fill="url(#glow)"/>

  <!-- Nova Star — fully inside safe zone -->
  <!-- Center: x=230, y=300. Arms: 170px. Tips: 188px. Leftmost: 230-188=42 ✓ -->
  <g transform="translate(230, 300)">
    <path d="M0,-170 C19,-42 42,-19 170,0 C42,19 19,42 0,170 C-19,42 -42,19 -170,0 C-42,-19 -19,-42 0,-170 Z"
          fill="url(#star-grad)" opacity="0.9"/>
    <circle cx="0" cy="0" r="36" fill="url(#core)" opacity="0.95"/>
    <line x1="0" y1="-188" x2="0" y2="-162" stroke="#18BCF2" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="162" x2="0" y2="188" stroke="#FFB347" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-188" y1="0" x2="-162" y2="0" stroke="#18BCF2" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="162" y1="0" x2="188" y2="0" stroke="#FFB347" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Text block — all left-aligned at x=460, consistent edge -->

  <!-- Title: HA-NOVA -->
  <text x="460" y="210" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="148" font-weight="800" fill="white" text-anchor="start"
        letter-spacing="8" filter="url(#title-glow)">HA-NOVA</text>

  <!-- Decorative gradient line -->
  <line x1="460" y1="240" x2="1220" y2="240" stroke="url(#line-grad)" stroke-width="2"/>

  <!-- Tagline -->
  <text x="460" y="310" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="40" font-weight="300" fill="#B8CCE0" text-anchor="start"
        letter-spacing="2">Your AI meets Home Assistant</text>

  <!-- Sub-tagline -->
  <text x="460" y="352" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="28" font-weight="400" fill="#6B8BA8" text-anchor="start"
        letter-spacing="1.5">AI that reads before it writes.</text>


  <!-- Pill badges — left-aligned with text, larger -->
  <g transform="translate(0, 480)">
    <!-- Pill 1 -->
    <g transform="translate(460, 0)">
      <rect x="0" y="-28" width="230" height="56" rx="28" fill="none" stroke="#18BCF2" stroke-width="1.5" opacity="0.5"/>
      <text x="115" y="9" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#18BCF2" text-anchor="middle" opacity="0.85">Safe by Design</text>
    </g>
    <!-- Pill 2 -->
    <g transform="translate(710, 0)">
      <rect x="0" y="-28" width="230" height="56" rx="28" fill="none" stroke="#FFB347" stroke-width="1.5" opacity="0.5"/>
      <text x="115" y="9" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#FFB347" text-anchor="middle" opacity="0.85">Beyond the UI</text>
    </g>
    <!-- Pill 3 -->
    <g transform="translate(960, 0)">
      <rect x="0" y="-28" width="260" height="56" rx="28" fill="none" stroke="#18BCF2" stroke-width="1.5" opacity="0.5"/>
      <text x="130" y="9" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#18BCF2" text-anchor="middle" opacity="0.85">Plain Text Skills</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <line x1="0" y1="638" x2="1280" y2="638" stroke="url(#star-grad)" stroke-width="2" opacity="0.15"/>
</svg>
