name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag must point to a commit on main. Aborting release."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum

      - name: Verify repository
        run: npm run verify

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --skip=sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build install bundles
        run: bash scripts/release/build-install-bundle.sh "${GITHUB_REF_NAME#v}"

      - name: Upload install bundles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" dist/install-bundles/* --clobber

  smoke-installers:
    name: Post-publish smoke installers (${{ matrix.os }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      HA_NOVA_VERSION: ${{ github.ref_name }}
      HA_NOVA_NO_SETUP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Smoke Unix installer
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash install.sh
          ~/.local/bin/ha-nova version
          ~/.local/bin/ha-nova check-update --quiet
          ~/.local/bin/ha-nova update --version "${HA_NOVA_VERSION#v}"
          ~/.local/bin/ha-nova uninstall --yes

      - name: Smoke Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./install.ps1
          & "$HOME/.local/share/ha-nova/ha-nova.exe" version
          & "$HOME/.local/share/ha-nova/ha-nova.exe" check-update --quiet
          & "$HOME/.local/share/ha-nova/ha-nova.exe" update --version "$env:HA_NOVA_VERSION"
          & "$HOME/.local/share/ha-nova/ha-nova.exe" uninstall --yes
