name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "20 14 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        id: analyze
        continue-on-error: true
        uses: github/codeql-action/analyze@v4

      - name: Note non-blocking CodeQL fallback
        if: ${{ steps.analyze.outcome == 'failure' }}
        run: |
          echo "CodeQL analyze failed in non-blocking mode."
          echo "Most common cause: code scanning is not enabled in repository settings."
          echo "Enable code scanning to enforce CodeQL as a strict gate."
