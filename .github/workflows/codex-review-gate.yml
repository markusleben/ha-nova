name: Codex Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: codex-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review-gate:
    name: codex-review-gate
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Codex review bot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "⏳ Waiting for chatgpt-codex-connector[bot] to review..."

          # Get head commit timestamp — only count bot signals newer than this
          # (reactions persist across pushes; stale +1 must not skip the gate)
          COMMIT_TIME=$(gh api "repos/${REPO}/commits/${HEAD_SHA}" \
            2>/dev/null | jq -r '.commit.committer.date' || echo "")
          echo "Head commit: ${HEAD_SHA:0:8} at ${COMMIT_TIME}"

          echo "Initial wait: 5 minutes (bot takes ~7 min)"
          sleep 300

          for attempt in 1 2 3 4; do
            echo "Poll attempt ${attempt}/4..."

            # Check 1: +1 reaction on PR = bot reviewed, no findings
            # Only count reactions created after the current head commit
            if [ -n "$COMMIT_TIME" ]; then
              REACTION=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/reactions" \
                2>/dev/null | jq --arg since "$COMMIT_TIME" \
                '[.[] | select(.user.login == "chatgpt-codex-connector[bot]" and .content == "+1" and .created_at > $since)] | length' \
                || echo "0")
            else
              REACTION=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/reactions" \
                2>/dev/null | jq '[.[] | select(.user.login == "chatgpt-codex-connector[bot]" and .content == "+1")] | length' \
                || echo "0")
            fi

            if [ "$REACTION" -gt 0 ]; then
              echo "✅ Codex bot reacted with 👍 — no findings. Gate passed."
              exit 0
            fi

            # Check 2: PR-level reviews = bot posted findings
            # Only count reviews submitted after the current head commit
            if [ -n "$COMMIT_TIME" ]; then
              REVIEWS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" --paginate \
                2>/dev/null | jq --arg since "$COMMIT_TIME" \
                '[.[] | select(.user.login == "chatgpt-codex-connector[bot]" and .submitted_at > $since)] | length' \
                || echo "0")
            else
              REVIEWS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" --paginate \
                2>/dev/null | jq '[.[].user.login // empty] | map(select(. == "chatgpt-codex-connector[bot]")) | length' \
                || echo "0")
            fi

            # Check 3: Inline review comments (created after head commit)
            if [ -n "$COMMIT_TIME" ]; then
              INLINE=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/comments" --paginate \
                2>/dev/null | jq --arg since "$COMMIT_TIME" \
                '[.[] | select(.user.login == "chatgpt-codex-connector[bot]" and .created_at > $since)] | length' \
                || echo "0")
            else
              INLINE=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/comments" --paginate \
                2>/dev/null | jq '[.[].user.login // empty] | map(select(. == "chatgpt-codex-connector[bot]")) | length' \
                || echo "0")
            fi

            TOTAL=$(( REVIEWS + INLINE ))

            if [ "$TOTAL" -gt 0 ]; then
              echo "⚠️ Codex bot posted ${TOTAL} review comment(s). Check findings before merge."
              exit 0
            fi

            if [ "$REACTION" -eq 0 ] && [ "$TOTAL" -eq 0 ] && [ "$attempt" -lt 4 ]; then
              echo "Bot not found yet. Waiting 60s..."
              sleep 60
            fi
          done

          echo "⚠️ Codex review bot did not respond after ~9 minutes."
          echo "Proceeding — bot may have skipped this PR."
          exit 0
