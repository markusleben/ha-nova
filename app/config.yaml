name: NOVA Relay
version: "0.1.0"
slug: ha_nova_relay
description: Thin Home Assistant relay for WS proxy and skill workflows
url: https://github.com/markusleben/ha-nova
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
ingress: false
ports:
  8791/tcp: 8791
ports_description:
  8791/tcp: Relay HTTP API
homeassistant_api: true
hassio_api: true
hassio_role: default
panel_icon: mdi:lan-connect

options:
  relay_auth_token: null
  ha_llat: ""
  ws_allowlist_append: ""

schema:
  relay_auth_token: password
  ha_llat: "password?"
  ws_allowlist_append: "str?"
